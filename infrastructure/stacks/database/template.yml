AWSTemplateFormatVersion: "2010-09-09"
Transform: AWS::Serverless-2016-10-31
Description: SANA-IA - RDS PostgreSQL (free tier)

Parameters:
  Env:
    Type: String
  SubnetIds:
    Type: CommaDelimitedList
    Description: At least 2 subnets in different AZs (RDS DB Subnet Group requirement)
  DatabaseSecurityGroupId:
    Type: String
  DbSecretArn:
    Type: String
  DBInstanceClass:
    Type: String
    Default: db.t3.micro
  DBName:
    Type: String
    Default: sana_db
  PostgresEngineVersion:
    Type: String
    Default: "16.4"
    Description: >-
      If deploy fails with "engine version not supported", list valid versions with:
      aws rds describe-db-engine-versions --engine postgres --query "DBEngineVersions[].EngineVersion" --output table

Resources:
  DbSubnetGroup:
    Type: AWS::RDS::DBSubnetGroup
    Properties:
      DBSubnetGroupDescription: !Sub "SANA (${Env}) - subnets for the RDS instance"
      SubnetIds: !Ref SubnetIds

  DbInstance:
    Type: AWS::RDS::DBInstance
    DeletionPolicy: Delete
    Properties:
      DBInstanceIdentifier: !Sub "sana-db-${Env}"
      Engine: postgres
      EngineVersion: !Ref PostgresEngineVersion
      DBInstanceClass: !Ref DBInstanceClass
      AllocatedStorage: "20"
      StorageType: gp2
      StorageEncrypted: true
      DBName: !Ref DBName
      # Pulled directly from Secrets Manager at creation time — never appears in this template, in
      # parameter_overrides, or in CloudFormation events.
      MasterUsername: !Sub "{{resolve:secretsmanager:${DbSecretArn}:SecretString:username}}"
      MasterUserPassword: !Sub "{{resolve:secretsmanager:${DbSecretArn}:SecretString:password}}"
      DBSubnetGroupName: !Ref DbSubnetGroup
      VPCSecurityGroups:
        - !Ref DatabaseSecurityGroupId
      PubliclyAccessible: false
      MultiAZ: false
      BackupRetentionPeriod: 1
      DeletionProtection: false

Outputs:
  DbEndpointAddress:
    Value: !GetAtt DbInstance.Endpoint.Address
  DbEndpointPort:
    Value: !GetAtt DbInstance.Endpoint.Port
