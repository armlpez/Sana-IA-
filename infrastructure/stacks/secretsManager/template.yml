AWSTemplateFormatVersion: "2010-09-09"
Transform: AWS::Serverless-2016-10-31
Description: SANA-IA - Secrets Manager secrets

Parameters:
  Env:
    Type: String
  # External LLM API key values — sourced from samconfig (gitignored), passed as
  # NoEcho params so they don't appear in CloudFormation console/events.
  GeminiApiKey:
    Type: String
    NoEcho: true
    Default: "REPLACE_ME_AFTER_DEPLOY"
  GroqApiKey:
    Type: String
    NoEcho: true
    Default: "REPLACE_ME_AFTER_DEPLOY"
  CerebrasApiKey:
    Type: String
    NoEcho: true
    Default: "REPLACE_ME_AFTER_DEPLOY"
  BedrockMantleApiKey:
    Type: String
    NoEcho: true
    Default: "REPLACE_ME_AFTER_DEPLOY"
  # SMTP credential for outbound email (account verification / password reset).
  # Sourced from samconfig (gitignored), passed as NoEcho so it doesn't appear
  # in CloudFormation console/events.
  SmtpPassword:
    Type: String
    NoEcho: true
    Default: "REPLACE_ME_AFTER_DEPLOY"

Resources:
  # Auto-generated by CloudFormation — the real password never appears in this template or in git.
  DbSecret:
    Type: AWS::SecretsManager::Secret
    Properties:
      Name: !Sub "sana-ia/${Env}/db-credentials"
      Description: RDS PostgreSQL master credentials (auto-generated password)
      GenerateSecretString:
        SecretStringTemplate: '{"username": "sana_admin"}'
        GenerateStringKey: "password"
        PasswordLength: 32
        ExcludeCharacters: '"@/\'

  JwtAccessSecret:
    Type: AWS::SecretsManager::Secret
    Properties:
      Name: !Sub "sana-ia/${Env}/jwt-access-secret"
      Description: JWT access token signing secret (auto-generated)
      GenerateSecretString:
        PasswordLength: 48
        ExcludeCharacters: '"@/\'
        ExcludePunctuation: true

  JwtRefreshSecret:
    Type: AWS::SecretsManager::Secret
    Properties:
      Name: !Sub "sana-ia/${Env}/jwt-refresh-secret"
      Description: JWT refresh token signing secret (auto-generated)
      GenerateSecretString:
        PasswordLength: 48
        ExcludeCharacters: '"@/\'
        ExcludePunctuation: true

  # External key (Gemini) — value comes from samconfig via the GeminiApiKey param.
  GeminiApiKeySecret:
    Type: AWS::SecretsManager::Secret
    Properties:
      Name: !Sub "sana-ia/${Env}/gemini-api-key"
      Description: "Google Gemini API key (value from samconfig GeminiApiKey param)"
      SecretString: !Ref GeminiApiKey

  # PLACEHOLDER — GitHub PAT (repo:read only) so the EC2 can clone the private repo.
  # Set the real value after deploy:
  #   aws secretsmanager put-secret-value --secret-id <arn> --secret-string <your-pat>
  GitHubPatSecret:
    Type: AWS::SecretsManager::Secret
    Properties:
      Name: !Sub "sana-ia/${Env}/github-pat"
      Description: "GitHub PAT to clone the private Sana-IA- repo - PLACEHOLDER, fill in after deploy"
      SecretString: "REPLACE_ME_AFTER_DEPLOY"

  # Groq API key (fallback provider #1) — value from samconfig via GroqApiKey param.
  GroqApiKeySecret:
    Type: AWS::SecretsManager::Secret
    Properties:
      Name: !Sub "sana-ia/${Env}/groq-api-key"
      Description: "Groq API key (LLM fallback #1, value from samconfig GroqApiKey param)"
      SecretString: !Ref GroqApiKey

  # Cerebras API key (fallback provider #2) — value from samconfig via CerebrasApiKey param.
  CerebrasApiKeySecret:
    Type: AWS::SecretsManager::Secret
    Properties:
      Name: !Sub "sana-ia/${Env}/cerebras-api-key"
      Description: "Cerebras API key (LLM fallback #2, value from samconfig CerebrasApiKey param)"
      SecretString: !Ref CerebrasApiKey

  # Bedrock Mantle API key (primary provider) — Bearer token, NOT an AWS IAM
  # credential. Value from samconfig via BedrockMantleApiKey param.
  BedrockMantleApiKeySecret:
    Type: AWS::SecretsManager::Secret
    Properties:
      Name: !Sub "sana-ia/${Env}/bedrock-mantle-api-key"
      Description: "Bedrock Mantle API key (LLM primary provider, value from samconfig BedrockMantleApiKey param)"
      SecretString: !Ref BedrockMantleApiKey

  # SMTP password (account-verification / password-reset email) — value from
  # samconfig via SmtpPassword param.
  SmtpPasswordSecret:
    Type: AWS::SecretsManager::Secret
    Properties:
      Name: !Sub "sana-ia/${Env}/smtp-password"
      Description: "SMTP password for outbound email (value from samconfig SmtpPassword param)"
      SecretString: !Ref SmtpPassword

Outputs:
  DbSecretArn:
    Value: !Ref DbSecret
  JwtAccessSecretArn:
    Value: !Ref JwtAccessSecret
  JwtRefreshSecretArn:
    Value: !Ref JwtRefreshSecret
  GeminiApiKeySecretArn:
    Value: !Ref GeminiApiKeySecret
  GitHubPatSecretArn:
    Value: !Ref GitHubPatSecret
  GroqApiKeySecretArn:
    Value: !Ref GroqApiKeySecret
  CerebrasApiKeySecretArn:
    Value: !Ref CerebrasApiKeySecret
  BedrockMantleApiKeySecretArn:
    Value: !Ref BedrockMantleApiKeySecret
  SmtpPasswordSecretArn:
    Value: !Ref SmtpPasswordSecret
