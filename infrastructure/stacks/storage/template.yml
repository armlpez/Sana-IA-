AWSTemplateFormatVersion: "2010-09-09"
Transform: AWS::Serverless-2016-10-31
Description: SANA-IA — S3 bucket for lab images (OCR)

Parameters:
  Env:
    Type: String

Resources:
  LabsBucket:
    Type: AWS::S3::Bucket
    DeletionPolicy: Delete
    Properties:
      BucketName: !Sub "sana-ia-labs-${Env}-${AWS::AccountId}"
      BucketEncryption:
        ServerSideEncryptionConfiguration:
          - ServerSideEncryptionByDefault:
              SSEAlgorithm: AES256
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        BlockPublicPolicy: true
        IgnorePublicAcls: true
        RestrictPublicBuckets: true
      LifecycleConfiguration:
        Rules:
          - Id: ExpireLabImages
            Status: Enabled
            Prefix: labs/
            ExpirationInDays: 7
      Tags:
        - Key: Name
          Value: !Sub "sana-ia-labs-${Env}"

Outputs:
  BucketName:
    Value: !Ref LabsBucket
  BucketArn:
    Value: !GetAtt LabsBucket.Arn
