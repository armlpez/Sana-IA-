AWSTemplateFormatVersion: "2010-09-09"
Transform: AWS::Serverless-2016-10-31
Description: "SANA-IA — Backend EC2 instance (Docker: NestJS + Redis)"

Parameters:
  Env:
    Type: String
  InstanceType:
    Type: String
    Default: t3.micro
  LatestAmiId:
    Type: AWS::SSM::Parameter::Value<AWS::EC2::Image::Id>
    Default: /aws/service/ami-amazon-linux-latest/al2023-ami-kernel-default-x86_64
  ComputeSubnetId:
    Type: AWS::EC2::Subnet::Id
  BackendSecurityGroupId:
    Type: String
  InstanceProfileName:
    Type: String
  GitHubRepoUrl:
    Type: String
  GitHubBranch:
    Type: String
    Default: main
  GitHubPatSecretArn:
    Type: String
  DbSecretArn:
    Type: String
  JwtAccessSecretArn:
    Type: String
  JwtRefreshSecretArn:
    Type: String
  GeminiApiKeySecretArn:
    Type: String
  GroqApiKeySecretArn:
    Type: String
  CerebrasApiKeySecretArn:
    Type: String
  BedrockMantleApiKeySecretArn:
    Type: String
  SmtpPasswordSecretArn:
    Type: String
  EmailType:
    Type: String
    Default: log
    AllowedValues:
      - log
      - smtp
    Description: "'log' prints verification/reset links to the app's stdout (dev default, no real email sent). 'smtp' sends via SmtpHost/SmtpUser/SmtpPasswordSecretArn."
  SmtpHost:
    Type: String
    Default: smtp.gmail.com
  SmtpPort:
    Type: String
    Default: "587"
  SmtpUser:
    Type: String
    Default: ""
    Description: "SMTP username (e.g. a Gmail address for dev/testing). Leave blank while EmailType=log."
  FrontendUrl:
    Type: String
    Default: ""
    Description: "Base URL embedded in verification/reset email links. The backend serves these landing pages itself (mobile-only frontend) — set this to http://<BackendEip>:3000 once the stack's static EIP is known (see the FrontendUrl comment in samconfig.toml)."
  DbEndpointAddress:
    Type: String
  DbEndpointPort:
    Type: String
  DBName:
    Type: String
  StorageType:
    Type: String
    Default: local
    AllowedValues:
      - local
      - s3
  LabsBucketName:
    Type: String

Resources:
  BackendInstance:
    Type: AWS::EC2::Instance
    Properties:
      ImageId: !Ref LatestAmiId
      InstanceType: !Ref InstanceType
      IamInstanceProfile: !Ref InstanceProfileName
      NetworkInterfaces:
        - DeviceIndex: 0
          AssociatePublicIpAddress: true
          SubnetId: !Ref ComputeSubnetId
          GroupSet:
            - !Ref BackendSecurityGroupId
      BlockDeviceMappings:
        - DeviceName: /dev/xvda
          Ebs:
            VolumeSize: 30
            VolumeType: gp3
            Encrypted: true
      Tags:
        - Key: Name
          Value: !Sub "sana-backend-${Env}"
      # NOTE on ${...} below: only names that are Parameters/pseudo-parameters of THIS
      # template are meant to be replaced by CloudFormation. Every bash-runtime variable
      # is written WITHOUT curly braces ($VAR, not ${VAR}) specifically so Fn::Sub leaves
      # it untouched.
      UserData:
        Fn::Base64: !Sub |
          #!/bin/bash
          set -euxo pipefail
          exec > >(tee -a /var/log/sana-userdata.log) 2>&1
          echo "=== SANA UserData: provisioning ==="

          dnf update -y
          dnf install -y docker git python3

          systemctl enable --now docker
          usermod -aG docker ec2-user

          mkdir -p /usr/libexec/docker/cli-plugins
          curl -fsSL https://github.com/docker/compose/releases/latest/download/docker-compose-linux-x86_64 \
            -o /usr/libexec/docker/cli-plugins/docker-compose
          chmod +x /usr/libexec/docker/cli-plugins/docker-compose

          # dnf's bundled buildx is often older than what the latest Compose CLI requires
          # for `compose build` (Compose enforces a minimum buildx version at runtime).
          # Fetch the latest buildx release instead of relying on the OS package version.
          BUILDX_URL=$(curl -fsSL https://api.github.com/repos/docker/buildx/releases/latest \
            | grep "browser_download_url.*linux-amd64\"" | cut -d '"' -f4)
          curl -fsSL "$BUILDX_URL" -o /usr/libexec/docker/cli-plugins/docker-buildx
          chmod +x /usr/libexec/docker/cli-plugins/docker-buildx

          command -v aws >/dev/null 2>&1 || {
            curl -fsSL "https://awscli.amazonaws.com/awscli-exe-linux-x86_64.zip" -o /tmp/awscliv2.zip
            cd /tmp && unzip -q awscliv2.zip && ./aws/install
          }

          mkdir -p /opt/sana-ia

          # Written verbatim (quoted heredoc) — bash vars below are expanded when THIS
          # script runs later, via SSM, not when UserData writes it to disk.
          cat > /opt/sana-ia/deploy.sh <<'DEPLOYEOF'
          #!/bin/bash
          set -euo pipefail
          exec > >(tee -a /var/log/sana-deploy.log) 2>&1
          echo "=== SANA deploy: $(date -u) ==="

          REGION="${AWS::Region}"
          APP_DIR=/opt/sana-ia/app
          REPO_URL="${GitHubRepoUrl}"
          BRANCH="${GitHubBranch}"

          get_secret() {
            aws secretsmanager get-secret-value --secret-id "$1" --region "$REGION" --query SecretString --output text
          }

          GITHUB_TOKEN=$(get_secret "${GitHubPatSecretArn}")
          DB_JSON=$(get_secret "${DbSecretArn}")
          DB_USERNAME=$(echo "$DB_JSON" | python3 -c "import json,sys; print(json.load(sys.stdin)['username'])")
          DB_PASSWORD=$(echo "$DB_JSON" | python3 -c "import json,sys; print(json.load(sys.stdin)['password'])")
          JWT_SECRET=$(get_secret "${JwtAccessSecretArn}")
          JWT_REFRESH_SECRET=$(get_secret "${JwtRefreshSecretArn}")
          GEMINI_API_KEY=$(get_secret "${GeminiApiKeySecretArn}")
          GROQ_API_KEY=$(get_secret "${GroqApiKeySecretArn}")
          CEREBRAS_API_KEY=$(get_secret "${CerebrasApiKeySecretArn}")
          BEDROCK_MANTLE_API_KEY=$(get_secret "${BedrockMantleApiKeySecretArn}")
          SMTP_PASSWORD=$(get_secret "${SmtpPasswordSecretArn}")

          AUTH_REPO_URL=$(echo "$REPO_URL" | sed "s#https://#https://x-access-token:$GITHUB_TOKEN@#")

          if [ -d "$APP_DIR/.git" ]; then
            echo "Repo already cloned — pulling latest $BRANCH"
            cd "$APP_DIR"
            git remote set-url origin "$AUTH_REPO_URL"
            git fetch origin "$BRANCH"
            git reset --hard "origin/$BRANCH"
          else
            echo "Cloning $BRANCH"
            git clone --branch "$BRANCH" --depth 1 "$AUTH_REPO_URL" "$APP_DIR"
          fi

          cat > "$APP_DIR/sana-ia-backend/.env" <<ENVEOF
          DB_HOST=${DbEndpointAddress}
          DB_PORT=${DbEndpointPort}
          DB_USERNAME=$DB_USERNAME
          DB_PASSWORD=$DB_PASSWORD
          DB_NAME=${DBName}
          DB_SSL=true
          # TEMPORARY: base schema isn't fully covered by migrations yet, so TypeORM
          # sync creates it. Remove this once a full initial migration exists.
          DB_SYNCHRONIZE=true
          NODE_ENV=production
          JWT_SECRET=$JWT_SECRET
          JWT_REFRESH_SECRET=$JWT_REFRESH_SECRET
          LLM_PRIMARY_PROVIDER=bedrock
          LLM_FALLBACK_CHAIN=gemini,groq,cerebras
          BEDROCK_MANTLE_API_KEY=$BEDROCK_MANTLE_API_KEY
          BEDROCK_MODEL_COLLECTING=openai.gpt-oss-20b
          BEDROCK_MODEL_ANALYZING=openai.gpt-oss-20b
          BEDROCK_MODEL_COMPLETED=openai.gpt-oss-120b
          BEDROCK_MODEL_VISION=qwen.qwen3-vl-235b-a22b-instruct
          BEDROCK_RETRY_MAX=2
          GEMINI_API_KEY=$GEMINI_API_KEY
          GEMINI_MODEL_COLLECTING=gemini-3.1-flash-lite
          GEMINI_MODEL_ANALYZING=gemini-3.1-flash-lite
          GEMINI_MODEL_COMPLETED=gemini-3.1-flash-lite
          GROQ_API_KEY=$GROQ_API_KEY
          GROQ_MODEL_COLLECTING=llama-3.3-70b-versatile
          GROQ_MODEL_ANALYZING=llama-3.3-70b-versatile
          GROQ_MODEL_COMPLETED=llama-3.3-70b-versatile
          GROQ_MODEL_VISION=qwen/qwen3.6-27b
          CEREBRAS_API_KEY=$CEREBRAS_API_KEY
          CEREBRAS_MODEL_COLLECTING=gpt-oss-120b
          CEREBRAS_MODEL_ANALYZING=gpt-oss-120b
          CEREBRAS_MODEL_COMPLETED=gpt-oss-120b
          GEMINI_TIMEOUT_FAST_MS=8000
          GEMINI_TIMEOUT_SLOW_MS=30000
          # Gemini is now a fallback (Bedrock is primary) — fallbacks fail fast,
          # the chain itself is the macro-level retry.
          GEMINI_RETRY_MAX=0
          GROQ_RETRY_MAX=0
          CEREBRAS_RETRY_MAX=0
          GEMINI_RETRY_BASE_MS=500
          GEMINI_RETRY_CAP_MS=4000
          CHAT_RATE_LIMIT_PER_MIN=12
          REDIS_HOST=redis
          REDIS_PORT=6379
          STORAGE_TYPE=${StorageType}
          S3_BUCKET=${LabsBucketName}
          AWS_REGION=$REGION
          EMAIL_TYPE=${EmailType}
          SMTP_HOST=${SmtpHost}
          SMTP_PORT=${SmtpPort}
          SMTP_USER=${SmtpUser}
          SMTP_PASS=$SMTP_PASSWORD
          FRONTEND_URL=${FrontendUrl}
          ENVEOF
          chmod 600 "$APP_DIR/sana-ia-backend/.env"

          cd "$APP_DIR/sana-ia-backend"
          docker compose --profile cloud up -d --build

          echo "=== SANA deploy done: $(date -u) ==="
          DEPLOYEOF
          chmod +x /opt/sana-ia/deploy.sh

          # First-boot attempt — non-fatal. It WILL fail here if the Gemini/GitHub secrets
          # are still placeholders (expected on the very first deploy). Fill them in, then
          # re-run manually: sudo /opt/sana-ia/deploy.sh
          /opt/sana-ia/deploy.sh || echo "First deploy attempt failed (expected if secrets are still placeholders). Fill in the real secrets, then run: sudo /opt/sana-ia/deploy.sh"

          echo "=== SANA UserData: provisioning done ==="

  # Static public IP — without this, every stop/start cycle (e.g. to save cost
  # when idle) hands the instance a NEW ephemeral public IP, breaking anything
  # that hardcoded the old one (test scripts, mobile app config, DNS).
  BackendEip:
    Type: AWS::EC2::EIP
    Properties:
      Domain: vpc
      InstanceId: !Ref BackendInstance
      Tags:
        - Key: Name
          Value: !Sub "sana-backend-eip-${Env}"

Outputs:
  PublicIp:
    Value: !GetAtt BackendEip.PublicIp
  InstanceId:
    Value: !Ref BackendInstance
