AWSTemplateFormatVersion: "2010-09-09"
Transform: AWS::Serverless-2016-10-31
Description: SANA-IA — IAM role for the backend EC2 instance

Parameters:
  Env:
    Type: String
  DbSecretArn:
    Type: String
  JwtAccessSecretArn:
    Type: String
  JwtRefreshSecretArn:
    Type: String
  GeminiApiKeySecretArn:
    Type: String
  GitHubPatSecretArn:
    Type: String
  GroqApiKeySecretArn:
    Type: String
  CerebrasApiKeySecretArn:
    Type: String
  BedrockMantleApiKeySecretArn:
    Type: String
  LabsBucketArn:
    Type: String

Resources:
  BackendInstanceRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub "sana-backend-role-${Env}"
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              Service: ec2.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        # Enables shell access via SSM Session Manager — no SSH keys, no open port 22.
        - arn:aws:iam::aws:policy/AmazonSSMManagedInstanceCore
      Policies:
        - PolicyName: SanaSecretsAccess
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Effect: Allow
                Action: secretsmanager:GetSecretValue
                Resource:
                  - !Ref DbSecretArn
                  - !Ref JwtAccessSecretArn
                  - !Ref JwtRefreshSecretArn
                  - !Ref GeminiApiKeySecretArn
                  - !Ref GitHubPatSecretArn
                  - !Ref GroqApiKeySecretArn
                  - !Ref CerebrasApiKeySecretArn
                  - !Ref BedrockMantleApiKeySecretArn
        - PolicyName: SanaS3LabsAccess
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Effect: Allow
                Action:
                  - s3:PutObject
                  - s3:GetObject
                  - s3:DeleteObject
                Resource: !Sub "${LabsBucketArn}/*"
        # NOTE: no bedrock:InvokeModel policy here. Bedrock Mantle (the primary
        # LLM provider) authenticates via a Bearer API key fetched from Secrets
        # Manager above — not AWS SigV4/IAM. The classic Bedrock Runtime (Nova)
        # policy was removed: this account's Nova access is gated by an
        # account-level `authorizationStatus: NOT_AUTHORIZED` restriction that
        # no IAM policy can work around (confirmed identical failure across
        # IAM user, EC2 role, and Bedrock API key auth — see engram
        # decision/bedrock-provider-choice for the full investigation).

  BackendInstanceProfile:
    Type: AWS::IAM::InstanceProfile
    Properties:
      InstanceProfileName: !Sub "sana-backend-profile-${Env}"
      Roles:
        - !Ref BackendInstanceRole

Outputs:
  InstanceProfileName:
    Value: !Ref BackendInstanceProfile
  RoleArn:
    Value: !GetAtt BackendInstanceRole.Arn
