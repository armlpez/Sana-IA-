AWSTemplateFormatVersion: "2010-09-09"
Transform: AWS::Serverless-2016-10-31
Description: SANA-IA — Test environment (EC2 + RDS + S3), free-tier sized

Parameters:
  Env:
    Type: String
    Default: dev
    AllowedValues:
      - dev
      - qa
      - prod

  VpcId:
    Type: AWS::EC2::VPC::Id
    Description: VPC where SANA resources will be created (your account's default VPC works fine)

  ComputeSubnetId:
    Type: AWS::EC2::Subnet::Id
    Description: Public subnet for the EC2 instance (must route to an Internet Gateway)

  DbSubnetIds:
    Type: List<AWS::EC2::Subnet::Id>
    Description: At least 2 subnets in different AZs — required by RDS DB Subnet Groups even for single-AZ

  BackendCidr:
    Type: String
    Default: 0.0.0.0/0
    Description: "CIDR block allowed to reach the backend API on port 3000. Default: 0.0.0.0/0 (public). To restrict to specific IP(s), use /32 format (e.g. 203.0.113.5/32) or a range (e.g. 10.0.0.0/8)."
    AllowedPattern: '^(\d{1,3}\.){3}\d{1,3}/\d{1,2}$'
    ConstraintDescription: Must be a valid CIDR block (e.g. 0.0.0.0/0 or 203.0.113.5/32)

  GitHubRepoUrl:
    Type: String
    Default: https://github.com/armlpez/Sana-IA-.git

  GitHubBranch:
    Type: String
    Default: main

  InstanceType:
    Type: String
    Default: t3.micro

  DBInstanceClass:
    Type: String
    Default: db.t3.micro

  DBName:
    Type: String
    Default: sana_db

  StorageType:
    Type: String
    Default: local
    AllowedValues:
      - local
      - s3
    Description: Start with 'local' to validate the deploy, then flip to 's3' once the S3 adapter is confirmed working

  # External LLM API key values — set in samconfig.toml (gitignored). NoEcho keeps
  # them out of CloudFormation console/events. They seed the Secrets Manager secrets.
  GeminiApiKey:
    Type: String
    NoEcho: true
    Default: "REPLACE_ME_AFTER_DEPLOY"
    Description: Google Gemini API key (set in samconfig)
  GroqApiKey:
    Type: String
    NoEcho: true
    Default: "REPLACE_ME_AFTER_DEPLOY"
    Description: Groq API key (set in samconfig)
  CerebrasApiKey:
    Type: String
    NoEcho: true
    Default: "REPLACE_ME_AFTER_DEPLOY"
    Description: Cerebras API key (set in samconfig)
  BedrockMantleApiKey:
    Type: String
    NoEcho: true
    Default: "REPLACE_ME_AFTER_DEPLOY"
    Description: Bedrock Mantle API key — Bearer token, LLM primary provider (set in samconfig)
  SmtpPassword:
    Type: String
    NoEcho: true
    Default: "REPLACE_ME_AFTER_DEPLOY"
    Description: SMTP password for outbound email — account verification / password reset (set in samconfig)
  EmailType:
    Type: String
    Default: log
    AllowedValues:
      - log
      - smtp
    Description: "'log' prints links to stdout (dev default). 'smtp' sends real email via SmtpHost/SmtpUser/SmtpPassword."
  SmtpHost:
    Type: String
    Default: smtp.gmail.com
  SmtpPort:
    Type: String
    Default: "587"
  SmtpUser:
    Type: String
    Default: ""
    Description: SMTP username (e.g. a Gmail address). Leave blank while EmailType=log.
  FrontendUrl:
    Type: String
    Default: ""
    Description: Base URL embedded in verification/reset email links — set to http://<BackendEip>:3000 (see samconfig.toml comment)

Resources:
  SanaNetwork:
    Type: AWS::Serverless::Application
    Properties:
      Location: stacks/network/template.yml
      Parameters:
        Env: !Ref Env
        VpcId: !Ref VpcId
        BackendCidr: !Ref BackendCidr

  SanaSecrets:
    Type: AWS::Serverless::Application
    Properties:
      Location: stacks/secretsManager/template.yml
      Parameters:
        Env: !Ref Env
        GeminiApiKey: !Ref GeminiApiKey
        GroqApiKey: !Ref GroqApiKey
        CerebrasApiKey: !Ref CerebrasApiKey
        BedrockMantleApiKey: !Ref BedrockMantleApiKey
        SmtpPassword: !Ref SmtpPassword

  SanaStorage:
    Type: AWS::Serverless::Application
    Properties:
      Location: stacks/storage/template.yml
      Parameters:
        Env: !Ref Env

  SanaIam:
    Type: AWS::Serverless::Application
    Properties:
      Location: stacks/iam/template.yml
      Parameters:
        Env: !Ref Env
        DbSecretArn: !GetAtt SanaSecrets.Outputs.DbSecretArn
        JwtAccessSecretArn: !GetAtt SanaSecrets.Outputs.JwtAccessSecretArn
        JwtRefreshSecretArn: !GetAtt SanaSecrets.Outputs.JwtRefreshSecretArn
        GeminiApiKeySecretArn: !GetAtt SanaSecrets.Outputs.GeminiApiKeySecretArn
        GitHubPatSecretArn: !GetAtt SanaSecrets.Outputs.GitHubPatSecretArn
        GroqApiKeySecretArn: !GetAtt SanaSecrets.Outputs.GroqApiKeySecretArn
        CerebrasApiKeySecretArn: !GetAtt SanaSecrets.Outputs.CerebrasApiKeySecretArn
        BedrockMantleApiKeySecretArn: !GetAtt SanaSecrets.Outputs.BedrockMantleApiKeySecretArn
        SmtpPasswordSecretArn: !GetAtt SanaSecrets.Outputs.SmtpPasswordSecretArn
        LabsBucketArn: !GetAtt SanaStorage.Outputs.BucketArn

  SanaDatabase:
    Type: AWS::Serverless::Application
    Properties:
      Location: stacks/database/template.yml
      Parameters:
        Env: !Ref Env
        SubnetIds: !Join [",", !Ref DbSubnetIds]
        DatabaseSecurityGroupId: !GetAtt SanaNetwork.Outputs.DatabaseSecurityGroupId
        DbSecretArn: !GetAtt SanaSecrets.Outputs.DbSecretArn
        DBInstanceClass: !Ref DBInstanceClass
        DBName: !Ref DBName

  SanaCompute:
    Type: AWS::Serverless::Application
    Properties:
      Location: stacks/compute/template.yml
      Parameters:
        Env: !Ref Env
        InstanceType: !Ref InstanceType
        ComputeSubnetId: !Ref ComputeSubnetId
        BackendSecurityGroupId: !GetAtt SanaNetwork.Outputs.BackendSecurityGroupId
        InstanceProfileName: !GetAtt SanaIam.Outputs.InstanceProfileName
        GitHubRepoUrl: !Ref GitHubRepoUrl
        GitHubBranch: !Ref GitHubBranch
        GitHubPatSecretArn: !GetAtt SanaSecrets.Outputs.GitHubPatSecretArn
        DbSecretArn: !GetAtt SanaSecrets.Outputs.DbSecretArn
        JwtAccessSecretArn: !GetAtt SanaSecrets.Outputs.JwtAccessSecretArn
        JwtRefreshSecretArn: !GetAtt SanaSecrets.Outputs.JwtRefreshSecretArn
        GeminiApiKeySecretArn: !GetAtt SanaSecrets.Outputs.GeminiApiKeySecretArn
        GroqApiKeySecretArn: !GetAtt SanaSecrets.Outputs.GroqApiKeySecretArn
        CerebrasApiKeySecretArn: !GetAtt SanaSecrets.Outputs.CerebrasApiKeySecretArn
        BedrockMantleApiKeySecretArn: !GetAtt SanaSecrets.Outputs.BedrockMantleApiKeySecretArn
        SmtpPasswordSecretArn: !GetAtt SanaSecrets.Outputs.SmtpPasswordSecretArn
        EmailType: !Ref EmailType
        SmtpHost: !Ref SmtpHost
        SmtpPort: !Ref SmtpPort
        SmtpUser: !Ref SmtpUser
        FrontendUrl: !Ref FrontendUrl
        DbEndpointAddress: !GetAtt SanaDatabase.Outputs.DbEndpointAddress
        DbEndpointPort: !GetAtt SanaDatabase.Outputs.DbEndpointPort
        DBName: !Ref DBName
        StorageType: !Ref StorageType
        LabsBucketName: !GetAtt SanaStorage.Outputs.BucketName

Outputs:
  BackendUrl:
    Value: !Sub "http://${SanaCompute.Outputs.PublicIp}:3000"
  InstanceId:
    Value: !GetAtt SanaCompute.Outputs.InstanceId
  DbEndpoint:
    Value: !GetAtt SanaDatabase.Outputs.DbEndpointAddress
  LabsBucketName:
    Value: !GetAtt SanaStorage.Outputs.BucketName
  GeminiApiKeySecretArn:
    Value: !GetAtt SanaSecrets.Outputs.GeminiApiKeySecretArn
  GitHubPatSecretArn:
    Value: !GetAtt SanaSecrets.Outputs.GitHubPatSecretArn
