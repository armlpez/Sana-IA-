services:
  redis:
    image: redis:7-alpine
    container_name: sana-redis
    ports:
      - "${REDIS_PORT:-6379}:6379"
    command: redis-server --appendonly no --maxmemory 128mb --maxmemory-policy allkeys-lru
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 3
