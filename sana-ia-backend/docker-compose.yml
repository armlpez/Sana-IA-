services:
  redis:
    image: redis:7-alpine
    container_name: sana-redis
    ports:
      - "${REDIS_PORT:-6379}:6379"
    command: redis-server --appendonly no --maxmemory 128mb --maxmemory-policy noeviction
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 3

  # Only starts with `docker compose --profile cloud up -d` (e.g. on the EC2 host).
  # Local dev keeps running `nest start --watch` outside Docker against this same Redis.
  app:
    build: .
    container_name: sana-backend
    profiles: ["cloud"]
    env_file: .env
    environment:
      REDIS_HOST: sana-redis
    ports:
      - "3000:3000"
    depends_on:
      redis:
        condition: service_healthy
    restart: unless-stopped
    volumes:
      - ./uploads:/app/uploads
